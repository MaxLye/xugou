name = "xugou-backend"
main = "src/index.ts"
compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]

# 添加定时触发器，每分钟执行一次监控检查
[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "lye_cf_db"
database_id = "74528ec2-02f5-468f-af1c-241bf0309d0f"

[version_metadata]
binding = "CF_VERSION_METADATA"
